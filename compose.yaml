services:
  oxiderelay:
    image: ${OXIDERELAY_IMAGE:-kpakozz96pyc/oxiderelay:latest}
    container_name: oxiderelay
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${OXIDERELAY_PUBLISHED_PORT:-8080}:8080"
    volumes:
      - oxiderelay-data:/data

volumes:
  oxiderelay-data:
